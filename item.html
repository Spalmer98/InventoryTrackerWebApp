<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Info</title>
    <!-- Link to external CSS files here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
            <!-- Side Bar -->
    <div id="mySidenav" class="sidenav">
        <a href="search.html">Search</a>
        <a href="index.html">New Entry</a>
        <a href="items.html">Items</a>
        <a href="locations.html">Locations</a>
    </div>

    <div class="main">
        <header>
            <h1>Inventory Tracker</h1>
        </header>
    
        <form id="item.html" method="POST" enctype="multipart/form-data">

                        <!-- Text Box for item name -->
            <label for="itemName">Item Name:</label>
            <p>Test Filler</p>

                        <!-- Text Box for item description -->
            <label for="itemDescription">Item Description:</label><br>
            <p>Test Filler</p>

                        <!-- Datalist for locations -->
            <label for="locations">Location:</label>
            <p>Test Filler</p>
            
            <datalist id="locationsList">
                <option value="Garage">
                <option value="Basement">
                <option value="Storage Unit">
            </datalist><br><br><br>

                        <!-- Input for image file -->
            <img src="#" alt="Image Preview" id="imagePreview" style="display: none; max-width: 300px; margin-top: 10px;"><br><br><br>

        </form>

        <!-- Send data to database -->
        <p id="responseMessage"></p>
        
    </div>

    <footer>
        <p>&copy; 2026 Inventory Tracker</p>
    </footer>

    <!-- Link to external JavaScript files here -->
    <script src="script.js"></script>
</body>
</html>
