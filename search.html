<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker Application</title>
    <!-- Link to external CSS files here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
            <!-- Side Bar -->
    <div id="mySidenav" class="sidenav">
        <a href="index.html">Home</a>
        <a href="search.html">Search</a>
        <a href="entry.html">New Entry</a>
        <a href="items.html">Items</a>
        <a href="locations.html">Locations</a>
    </div>

    <div class="main">
        <header>
            <h1>Inventory Tracker</h1>
        </header>
    
        <form id="locations.html" method="POST">

                        <!-- Text Box for search bar" -->
            <label for="search">Search:</label>
            <input type="text" id="search" name="search" placeholder="Enter name of item" onkeyup="enableSubmit()">

                                    <!-- Submit Button -->
            <input type="submit" onclick="submit()" id="submitBtn" disabled>

        </form>

        <!-- Send data to database -->
        <p id="responseMessage"></p>
        
    </div>

    <footer>
        <p>&copy; 2026 Inventory Tracker</p>
    </footer>

    <!-- Link to external JavaScript files here -->
    <script src="script.js"></script>
</body>
</html>
