<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Homepage</title>
    <!-- Link to external CSS files here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inventory Tracker</h1>
    </header>

    <main>
        <p>Keep track of the items you're storing so it's easier to locate them later.</p>
    
        <form action="/submit-page" method="POST">
            <label for="itemname">Item Name:</label>
            <input type="text" id="itemname" name="itemname" placeholder="Enter name of item" required><br>

            <label for="itemdescription">Item Description:</label><br>
            <textarea id="itemdescription" name="itemdescription" rows="4" cols="50" placeholder="Enter item description" required></textarea><br>
            
            <input type="submit" value="Submit">
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Item Tracker</p>
    </footer>

    <!-- Link to external JavaScript files here -->
    <script src="script.js"></script>
</body>
</html>
