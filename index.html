<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory Tracker – Sign in</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-box { max-width: 360px; margin: 2rem 0; }
    .auth-box input, .auth-box button { display: block; margin: 0.5rem 0; width: 100%; box-sizing: border-box; }
    .auth-box .message { margin: 0.5rem 0; }
    .auth-box .message.error { color: #c00; }
    .auth-box button { margin-right: 0.5rem; width: auto; }
    .auth-links { margin-top: 1rem; }
    .auth-links a { margin-right: 1rem; }
  </style>
</head>
<body>
  <div id="mySidenav" class="sidenav">
    <a href="index.html">Home</a>
    <a href="search.html">Search</a>
    <a href="entry.html">New Entry</a>
    <a href="items.html">Items</a>
    <a href="locations.html">Locations</a>
  </div>

  <div class="main">
    <header>
      <h1>Inventory Tracker</h1>
    </header>

    <p>Create an account or sign in to manage your inventory.</p>

    <section id="auth" class="auth-box">
      <!-- Filled by supabaseClient.js -->
    </section>

    <section id="post-form-container">
      <!-- When signed in: links to New Entry and Items -->
    </section>

    <section id="posts-list" aria-hidden="true"></section>
  </div>

  <footer>
    <p>&copy; 2026 Inventory Tracker</p>
  </footer>

  <script type="module" src="supabaseClient.js"></script>
</body>
</html>
