<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker Application</title>
    <!-- Link to external CSS files here -->
    <!--link rel="stylesheet" href="style.css"-->
</head>
<body>
    <header>
        <h1>Inventory Tracker</h1>
    </header>

    <main>
        <p>Keep track of the items you're storing so it's easier to locate them later.</p>
    
        <form id="index.html" method="POST">

                        <!-- Text Box for item name enctype="multipart/form-data" -->
            <label for="itemName">Item Name:</label>
            <input type="text" id="itemName" name="itemName" placeholder="Enter name of item" onkeyup="enableSubmit()"><br><br>

                        <!-- Text Box for item description -->
            <label for="itemDescription">Item Description:</label><br>
            <textarea id="itemDescription" name="itemDescription" rows="4" cols="50" placeholder="Enter item description"></textarea><br><br>

                        <!-- Datalist for locations -->
            <label for="locations">Location:</label>
            <input list="locationsList" id="locations" name="locations" placeholder="Enter location" onkeyup="enableSubmit()">

            <datalist id="locationsList">
                <option value="Garage">
                <option value="Basement">
                <option value="Storage Unit">
            </datalist><br><br><br>

                        <!-- Input for image file -->
            <input type="file" accept="image/*" id="fileInput">
            <img src="#" alt="Image Preview" id="imagePreview" style="display: none; max-width: 300px; margin-top: 10px;"><br><br><br>

                        <!-- Submit Button -->
            <input type="submit" onclick="submit()" id="submitBtn" disabled>
        </form>

        <!-- Send data to database -->
        <p id="responseMessage"></p>
        
    </main>

    <footer>
        <p>&copy; 2026 Inventory Tracker</p>
    </footer>

    <!-- Link to external JavaScript files here -->
    <script src="script.js"></script>
</body>
</html>
